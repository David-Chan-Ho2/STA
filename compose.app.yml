services:
  server:
    build:
      context: ./server
    container_name: server
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
      - redis
      - mosquitto
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    networks:
      - app-network

  dashboard:
    build:
      context: ./dashboard
    container_name: dashboard
    depends_on:
      - server
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - /app/.next
    environment:
    - WATCHPACK_POLLING=true
    networks:
      - app-network

networks:
  app-network:
    name: shared-app-network
    driver: bridge
